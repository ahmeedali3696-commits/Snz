<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إنشاء حساب | SNZ Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #020617; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            min-height: 100dvh; 
        }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.7); 
            border: 1px solid rgba(168, 85, 247, 0.2); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
        }
        
        .cyber-input { 
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .cyber-input:focus { 
            border-color: #a855f7; 
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.15), inset 0 0 10px rgba(168, 85, 247, 0.05); 
            outline: none;
            transform: translateY(-2px);
        }

        .eye-btn {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px;
        }

        .eye-btn:hover { 
            color: #a855f7; 
            transform: translateY(-50%) scale(1.1); 
        }
        
        .btn-loading { 
            opacity: 0.7; 
            cursor: not-allowed; 
            pointer-events: none; 
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(2, 6, 23, 0.85);
            border-bottom: 1px solid rgba(168, 85, 247, 0.15);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0; left: 0; z-index: 50;
        }

        .ticker-content {
            display: flex;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }

        .ticker-content:hover { 
            animation-play-state: paused; 
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 pt-12">

    <div id="ultimateLoader" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-[#020617] transition-all duration-700">
        <div class="relative w-24 h-24 sm:w-32 sm:h-32 flex items-center justify-center mb-6 sm:mb-8">
            <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-purple-500 animate-spin opacity-80"></div>
            <div class="absolute inset-2 sm:inset-3 rounded-full border-b-2 border-l-2 border-cyan-500 animate-[spin_1.5s_reverse_infinite] opacity-60"></div>
            <div class="absolute inset-4 sm:inset-6 rounded-full border-t-2 border-dashed border-purple-300 animate-[spin_3s_linear_infinite] opacity-40"></div>
            <div class="w-10 h-10 sm:w-12 sm:h-12 bg-purple-500/20 rounded-full animate-ping absolute"></div>
            <span class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-500 tracking-widest z-10">SNZ</span>
        </div>
        <div class="flex items-center gap-2 sm:gap-3 px-4 text-center">
            <div class="flex gap-1 hidden sm:flex">
                <div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                <div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            </div>
            <div class="text-[9px] sm:text-[10px] text-purple-400 font-mono tracking-[0.2em] sm:tracking-[0.3em] uppercase break-words" id="loaderText">
                GENERATING SECURE KEYS...
            </div>
        </div>
    </div>

    <div class="ticker-wrap h-8 flex items-center">
        <div class="ticker-content gap-8 sm:gap-12 text-[9px] sm:text-[10px] font-mono">
            <span class="text-green-400 font-bold flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span> NEW VIP NODE DETECTED</span>
            <span class="text-purple-400 font-bold flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span> REGISTRATION ENCRYPTED [RSA-4096]</span>
            <span class="text-cyan-400 font-bold flex items-center gap-2"><span class="text-xs">📡</span> SCORPION RADAR SYNCING...</span>
            <span class="text-yellow-500 font-bold flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-ping"></span> PREPARING WELCOME BONUS...</span>
            <span class="text-green-400 font-bold flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span> GLOBAL NETWORK STABLE</span>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-10 sm:top-12 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 sm:w-[30rem] sm:h-[30rem] bg-purple-600/10 rounded-full blur-[80px] sm:blur-[120px] pointer-events-none"></div>

    <div class="glass-panel w-full max-w-md p-6 sm:p-8 md:p-10 rounded-[2rem] sm:rounded-[2.5rem] relative z-10 shadow-[0_0_50px_rgba(168,85,247,0.1)] border-t-4 border-purple-500 transform transition-all duration-500 hover:shadow-[0_0_60px_rgba(6,182,212,0.15)] mt-4">
        
        <div class="text-center mb-8 sm:mb-10">
            <h1 class="text-3xl sm:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-500 tracking-widest mb-1 sm:mb-2 drop-shadow-lg">SNZ</h1>
            <p class="text-gray-400 text-[9px] sm:text-[10px] font-mono uppercase tracking-[0.2em] sm:tracking-[0.3em]">Join The Elite Network</p>
            <div class="w-10 sm:w-12 h-1 bg-gradient-to-r from-purple-500 to-cyan-500 mx-auto mt-3 sm:mt-4 rounded-full"></div>
        </div>

        <form onsubmit="return handleRegister(event)" class="space-y-4 sm:space-y-5">
            <div class="group">
                <label class="block text-[10px] text-purple-400 group-focus-within:text-purple-300 transition-colors font-bold mb-1.5 sm:mb-2 uppercase tracking-wider">البريد الإلكتروني</label>
                <input type="email" id="rEmail" required placeholder="user@SNZ.com" class="w-full cyber-input p-3.5 sm:p-4 rounded-xl text-sm text-center text-white placeholder-gray-600 dir-ltr">
            </div>
            
            <div class="group">
                <label class="block text-[10px] text-purple-400 group-focus-within:text-purple-300 transition-colors font-bold mb-1.5 sm:mb-2 uppercase tracking-wider">كلمة المرور المشفرة</label>
                <div class="relative">
                    <input type="password" id="rPass" required placeholder="••••••••" class="w-full cyber-input p-3.5 sm:p-4 rounded-xl text-sm text-center text-white placeholder-gray-600 dir-ltr tracking-widest">
                    <button type="button" onclick="togglePassword()" class="eye-btn" id="eyeIcon">👁️</button>
                </div>
            </div>

            <div class="group">
                <label class="block text-[10px] text-gray-500 group-focus-within:text-purple-300 transition-colors font-bold mb-1.5 sm:mb-2 uppercase tracking-wider">كود الدعوة (إلزامي)</label>
                <input type="text" id="rRef" required placeholder="SNZ_99321" class="w-full cyber-input border-purple-500/20 p-3.5 sm:p-4 rounded-xl text-sm text-center text-purple-400 placeholder-gray-700 dir-ltr uppercase font-mono">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 hover:from-purple-500 hover:to-cyan-500 py-3.5 sm:py-4 rounded-xl font-black text-white shadow-[0_10px_20px_rgba(168,85,247,0.2)] hover:shadow-[0_15px_30px_rgba(6,182,212,0.3)] active:scale-95 transition-all duration-300 flex justify-center items-center gap-3 mt-4">
                <span id="btnText" class="text-sm sm:text-base">إنشاء الحساب وتوثيقه</span>
                <div id="btnSpinner" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </form>
        
        <div class="mt-6 sm:mt-8 text-center text-[11px] sm:text-xs text-gray-500 border-t border-white/5 pt-5 sm:pt-6">
            لديك حساب مسجل بالفعل؟ <a href="index.html" class="text-purple-400 font-bold hover:underline hover:text-purple-300 transition-colors">العودة لتسجيل الدخول</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="config.js"></script>
    <script>
        // --- 1. إدارة شاشة التحميل المعقدة ---
        window.addEventListener('load', () => {
            const texts = [
                "GENERATING SECURE KEYS...", 
                "ENCRYPTING USER DATA [RSA-4096]...", 
                "SYNCING WITH SCORPION NETWORK...", 
                "NODE ALLOCATION COMPLETE."
            ];
            const textEl = document.getElementById('loaderText');
            let i = 0;
            
            const textInterval = setInterval(() => {
                i++;
                if (i < texts.length) {
                    textEl.innerText = texts[i];
                } else {
                    clearInterval(textInterval);
                    const loader = document.getElementById('ultimateLoader');
                    loader.style.opacity = '0';
                    loader.style.transform = 'scale(1.1)';
                    setTimeout(() => loader.style.display = 'none', 700);
                }
            }, 600);
        });

        // --- 2. إظهار/إخفاء الباسورد ---
        function togglePassword() {
            const passInput = document.getElementById('rPass');
            const eyeBtn = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeBtn.style.color = '#a855f7'; 
            } else {
                passInput.type = 'password';
                eyeBtn.style.color = '#475569';
            }
        }

        // --- 3. نظام الإشعارات المنبثقة بحركته الكاملة ---
        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            toast.className = `px-4 sm:px-6 py-3 rounded-xl backdrop-blur-md border shadow-2xl text-[11px] sm:text-sm font-bold transform transition-all duration-300 translate-y-[-20px] opacity-0 flex items-center gap-2 sm:gap-3 ${
                type === 'success' ? 'bg-green-900/90 border-green-500 text-green-100' : 'bg-red-900/90 border-red-500 text-red-100'
            }`;
            
            toast.innerHTML = `<span class="text-base sm:text-lg">${type === 'success' ? '✅' : '🛑'}</span> <span>${message}</span>`;
            container.appendChild(toast);
            
            requestAnimationFrame(() => toast.classList.remove('translate-y-[-20px]', 'opacity-0'));
            
            setTimeout(() => {
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- 4. دالة التسجيل والتحقق من قاعدة البيانات ---
        async function handleRegister(e) {
            e.preventDefault();
            
            const email = document.getElementById('rEmail').value.trim();
            const pass = document.getElementById('rPass').value;
            // يتم أخذ كود الدعوة وتحويله لأحرف كبيرة لضمان المطابقة
            const refCode = document.getElementById('rRef').value.trim().toUpperCase();
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');

            // بدء تأثير التحميل على الزر
            btn.classList.add('btn-loading');
            btnText.innerText = "جاري التحقق من البيانات...";
            spinner.classList.remove('hidden');

            try {
                // التأكد من نجاح الاتصال
                if (typeof _supabase === 'undefined') {
                    throw new Error("فشل الاتصال بقاعدة البيانات.");
                }

                // الفحص الأول: التأكد أن البريد غير مسجل مسبقاً
                const { data: existingUser, error: checkError } = await _supabase.from('users').select('email').eq('email', email).maybeSingle();
                
                if (existingUser) {
                    throw new Error("هذا البريد الإلكتروني مسجل مسبقاً لدينا.");
                }

                // الفحص الثاني (الأساسي): التحقق من صحة كود الإحالة بشكل إلزامي
                if (refCode === "") {
                    throw new Error("يجب إدخال كود دعوة صالح للتسجيل في المنصة.");
                }

                const { data: refUser, error: refError } = await _supabase.from('users').select('uid').eq('uid', refCode).maybeSingle();
                
                if (!refUser) {
                    throw new Error("كود الدعوة غير صحيح أو غير متوفر في شبكتنا.");
                }
                
                let finalRef = refCode; // اعتماد الكود بعد تأكيد قاعدة البيانات

                // إنشاء UID عشوائي خاص بالمستخدم الجديد
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let newUID = 'SNZ-';
                for (let i = 0; i < 5; i++) {
                    newUID += chars.charAt(Math.floor(Math.random() * chars.length));
                }

                // رفع البيانات إلى السيرفر
                btnText.innerText = "جاري تشفير الحساب وإنشاؤه...";
                const { error: insertError } = await _supabase.from('users').insert([{ 
                    email: email, 
                    password: pass, 
                    referral: finalRef, 
                    balance: 0.00, 
                    plan: 'Free',
                    uid: newUID
                }]);

                // التعامل مع رفض قاعدة البيانات (RLS)
                if (insertError) {
                    console.log("خطأ في قاعدة البيانات:", insertError);
                    throw new Error("رفض السيرفر إضافة الحساب (تأكد من إعدادات RLS في Supabase).");
                }

                // رسالة النجاح والتحويل
                showToast("تم إنشاء الحساب بنجاح! جاري تحويلك لتسجيل الدخول...", "success");
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (err) {
                // إظهار الخطأ وإعادة الزر لحالته الطبيعية
                showToast(err.message, "error");
                btn.classList.remove('btn-loading');
                btnText.innerText = "إنشاء الحساب وتوثيقه";
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
