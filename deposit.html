<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNZ | Safe Gate V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main: #06b6d4; --side: #a855f7; }
        body { background: #020617; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; padding-top: 45px; min-height: 100dvh; user-select: none; }
        
        /* الكارت الزجاجي الفخم */
        .glass-card { 
            background: rgba(15, 23, 42, 0.85); 
            border: 1px solid rgba(6, 182, 212, 0.2); 
            backdrop-filter: blur(25px); 
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.8);
        }

        /* أزرار الاختيار التفاعلية */
        .select-card {
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .select-card.active {
            border-color: var(--main);
            background: rgba(6, 182, 212, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(6, 182, 212, 0.15);
        }

        /* كارت الشبكة الاحترافي */
        .network-card {
            border: 1px solid rgba(168, 85, 247, 0.2);
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.95));
            transition: all 0.3s ease;
        }
        .network-card.active {
            border-color: var(--side);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.3);
        }

        /* إطار الباركود العملاق */
        .qr-frame {
            background: white;
            padding: 18px;
            border-radius: 2.5rem;
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.4);
            display: inline-block;
        }

        /* شريط الأخبار المتحرك */
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { width: 100%; overflow: hidden; background: rgba(2, 6, 23, 0.98); border-bottom: 1px solid rgba(6, 182, 212, 0.25); position: fixed; top: 0; left: 0; z-index: 100; height: 35px; }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; }

        /* منطقة الرفع المربعة الاحترافية */
        .upload-square {
            width: 100%;
            aspect-ratio: 1 / 1; /* الحفاظ على شكل مربع مثالي */
            border: 2px dashed rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.3);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            max-width: 160px; /* تحديد حجم المربع ليناسب الموبايل */
            margin: 0 auto;
        }
        .upload-square:hover { border-color: var(--side); background: rgba(168, 85, 247, 0.05); }
        .proof-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ملء المربع بالصورة بالكامل بشكل أنيق */
            position: absolute;
            top: 0; left: 0;
        }
    </style>
</head>
<body>

    <div class="ticker-wrap flex items-center">
        <div class="ticker-content gap-10 text-[9px] font-mono text-cyan-400 uppercase tracking-widest">
            <span>🛡️ SECURE ASSET GATEWAY ACTIVE</span>
            <span>💎 USDT (BEP20) PROTOCOL ONLY</span>
            <span>🔒 ORDER ID SYSTEM VERIFIED</span>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-2 pb-10">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-white italic tracking-tight">DEPOSIT PANEL</h1>
            <div id="orderIdLabel" class="text-[9px] text-purple-400 font-bold font-mono tracking-widest">#GENERATING_SECURE_ID...</div>
        </div>

        <div class="glass-card p-7 border-t-4 border-cyan-500 relative overflow-hidden shadow-2xl">
            
            <div class="mb-8">
                <label class="text-[10px] font-black text-gray-500 mb-4 block uppercase tracking-wider text-right">01. حدد مبلغ الشحن (USDT)</label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="select-card amount-btn rounded-xl p-4 text-center cursor-pointer" onclick="pickAmount(this, 30)">
                        <div class="text-xl font-black text-white">$30</div>
                    </div>
                    <div class="select-card amount-btn rounded-xl p-4 text-center cursor-pointer" onclick="pickAmount(this, 60)">
                        <div class="text-xl font-black text-white">$60</div>
                    </div>
                    <div class="select-card amount-btn rounded-xl p-4 text-center cursor-pointer" onclick="pickAmount(this, 90)">
                        <div class="text-xl font-black text-white">$90</div>
                    </div>
                    <div class="select-card amount-btn rounded-xl p-4 text-center cursor-pointer" onclick="pickAmount(this, 120)">
                        <div class="text-xl font-black text-white">$120</div>
                    </div>
                </div>
            </div>

            <div id="stepNet" class="hidden mb-8 animate-in fade-in duration-500">
                <label class="text-[10px] font-black text-gray-500 mb-4 block uppercase tracking-wider text-right">02. حدد العملة والشبكة</label>
                <div class="network-card rounded-2xl p-5 flex items-center justify-between cursor-pointer group" onclick="pickNetwork(this)">
                    <div class="flex items-center gap-4">
                        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-10 h-10 drop-shadow-[0_0_8px_rgba(34,197,94,0.5)]">
                        <div class="text-right">
                            <div class="text-sm font-black text-white">USDT</div>
                            <div class="text-[9px] text-cyan-300 font-mono tracking-tighter">PROTOCOL: BEP20 (BSC)</div>
                        </div>
                    </div>
                    <div id="checkMark" class="w-6 h-6 border-2 border-white/10 rounded-full flex items-center justify-center text-xs"></div>
                </div>
            </div>

            <div id="stepFinal" class="hidden space-y-7 animate-in zoom-in duration-700">
                
                <div class="text-center">
                    <div class="qr-frame">
                        <img id="qrDisplay" src="" class="w-40 h-40">
                    </div>
                    <div class="mt-5 bg-black/50 border border-white/5 p-3 rounded-2xl flex items-center gap-2 max-w-[280px] mx-auto">
                        <input type="text" id="walletAddr" value="0x9F62fAD3A2e7e4B406FEd725F50806Ba7dAC0dfc" readonly class="bg-transparent text-[10px] text-cyan-400 font-mono w-full text-center outline-none">
                        <button onclick="copyWallet()" class="bg-cyan-600 text-white text-[10px] font-black px-4 py-2 rounded-xl active:scale-95 transition-all">نسخ</button>
                    </div>
                </div>

                <div class="space-y-4 pt-6 border-t border-white/5 text-right">
                    <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">03. إثبات العملية</h3>
                    <input type="text" id="txHashInput" placeholder="TXID / Transaction Hash (ألصق الكود هنا)" class="w-full bg-black/60 border border-white/10 p-4 rounded-xl text-xs text-center text-purple-300 outline-none focus:border-cyan-500">

                    <label class="upload-square flex flex-col items-center justify-center cursor-pointer group">
                        <div id="upUI" class="text-center group-hover:scale-110 transition-transform p-3">
                            <span class="text-3xl mb-1 block">🖼️</span>
                            <span class="text-[8px] font-black text-gray-500 uppercase tracking-widest block">إرفاق لقطة شاشة</span>
                        </div>
                        <img id="prevProof" class="hidden proof-image">
                        <input type="file" class="hidden" accept="image/*" onchange="loadProofImg(event)">
                    </label>
                </div>

                <button onclick="submitDeposit()" id="submitBtn" class="w-full py-5 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-purple-900/30 active:scale-95 transition-all">
                    Confirm & Submit
                </button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="config.js"></script>
    <script>
        const WALLET_ADDRESS = "0x9F62fAD3A2e7e4B406FEd725F50806Ba7dAC0dfc";
        let PROOF_IMG_BASE64 = "";

        // توليد Order ID فريد
        window.onload = () => {
            const id = "SNZ-TX-" + Math.floor(100000 + Math.random() * 900000);
            document.getElementById('orderIdLabel').innerText = "ORDER ID: #" + id;
        };

        function pickAmount(el, val) {
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            localStorage.setItem('pendingAmount', val);
            document.getElementById('stepNet').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('stepNet').offsetTop, behavior: 'smooth' });
        }

        function pickNetwork(el) {
            el.classList.add('active');
            document.getElementById('checkMark').innerHTML = "✓";
            document.getElementById('checkMark').classList.add('bg-purple-600', 'border-none', 'text-white', 'font-black');
            document.getElementById('stepFinal').classList.remove('hidden');
            document.getElementById('qrDisplay').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${WALLET_ADDRESS}`;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function loadProofImg(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                PROOF_IMG_BASE64 = reader.result;
                const prev = document.getElementById('prevProof');
                prev.src = reader.result;
                prev.classList.remove('hidden');
                document.getElementById('upUI').innerHTML = '<span class="text-2xl">✅</span>'; // إخفاء الواجهة القديمة
            };
            if(file) reader.readAsDataURL(file);
        }

        function copyWallet() {
            const el = document.getElementById('walletAddr');
            el.select();
            navigator.clipboard.writeText(el.value);
            alert("تم نسخ العنوان");
        }

        async function submitDeposit() {
            const amt = localStorage.getItem('pendingAmount');
            const tx = document.getElementById('txHashInput').value.trim();
            const oid = document.getElementById('orderIdLabel').innerText;
            const btn = document.getElementById('submitBtn');

            if(!tx && !PROOF_IMG_BASE64) return alert("يرجى إدخال TXID أو إرفاق صورة الإيصال");

            btn.innerText = "UPLOADING TO SECURE SERVER...";
            btn.disabled = true;

            try {
                const { error } = await _supabase.from('deposits').insert([{
                    order_id: oid,
                    user_email: localStorage.getItem('currentUserEmail') || "guest_user",
                    amount: parseFloat(amt),
                    network: 'USDT (BEP20)',
                    tx_hash: tx || "IMG_PROOF",
                    proof_img: PROOF_IMG_BASE64,
                    status: 'pending'
                }]);
                if(error) throw error;
                alert("تم إرسال الطلب بنجاح! سيتم التحقق خلال دقائق.");
                window.location.href = 'dashboard.html';
            } catch (e) {
                alert("خطأ: " + e.message);
                btn.disabled = false;
                btn.innerText = "Confirm & Submit";
            }
        }
    </script>
</body>
</html>
