<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNZ | شبكة الفريق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; padding-bottom: 90px; padding-top: 20px; min-height: 100dvh; }
        
        /* التأثيرات الزجاجية والنيون (مطابقة لصفحة حسابي) */
        .glass-card { background: rgba(10, 15, 30, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); transition: transform 0.3s ease; }
        .cyber-input { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s; color: #fff; font-family: monospace; text-align: center; font-weight: bold; letter-spacing: 2px;}
        .cyber-input:focus { border-color: #a855f7; outline: none; box-shadow: 0 0 20px rgba(168, 85, 247, 0.25); background: rgba(0,0,0,0.8); }
        
        .copy-btn { background: linear-gradient(90deg, rgba(14,165,233,0.1), rgba(2,6,23,0.8)); border: 1px solid rgba(14,165,233,0.3); border-right: 4px solid #0ea5e9; transition: all 0.3s; }
        .copy-btn:hover { background: linear-gradient(90deg, rgba(14,165,233,0.2), rgba(2,6,23,0.9)); box-shadow: 0 0 20px rgba(14,165,233,0.2); }
        .copy-btn:active { transform: scale(0.95); }

        /* سكرول القائمة */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #0ea5e9, #a855f7); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ultimateLoader" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-[#020617] transition-all duration-700">
        <div class="relative w-24 h-24 flex items-center justify-center mb-6">
            <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-cyan-500 animate-spin opacity-80"></div>
            <div class="absolute inset-3 rounded-full border-b-2 border-l-2 border-purple-500 animate-[spin_1.5s_reverse_infinite] opacity-60"></div>
            <span class="text-sm font-black text-white tracking-widest drop-shadow-[0_0_10px_#fff]">SNZ</span>
        </div>
        <div class="text-[9px] text-cyan-400 font-mono tracking-[0.2em] animate-pulse uppercase">Syncing Network...</div>
    </div>

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div class="px-5 mb-6 space-y-5">
        
        <div class="glass-card p-6 text-center relative overflow-hidden rounded-[2rem] border-t-4 border-cyan-500">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-40 bg-cyan-500/10 blur-[60px] rounded-full pointer-events-none"></div>
            
            <div class="relative z-10">
                <div class="w-16 h-16 mx-auto rounded-full bg-gradient-to-br from-cyan-400 to-purple-600 p-[2px] mb-3 shadow-[0_0_20px_rgba(6,182,212,0.3)]">
                    <div class="w-full h-full bg-[#020617] rounded-full flex items-center justify-center text-2xl relative overflow-hidden">
                        <span class="relative z-10">🌐</span>
                    </div>
                </div>
                <h2 class="text-xs font-black text-white mb-1 tracking-wider uppercase">شبكة الإحالة الخاصة بك</h2>
                <p class="text-[9px] text-gray-400 font-mono tracking-widest mb-6 uppercase">Affiliate Dashboard</p>

                <div class="grid grid-cols-2 gap-3 pt-5 border-t border-white/5">
                    <div class="bg-[#020617] p-3 rounded-2xl border border-white/5 relative overflow-hidden">
                        <div class="absolute inset-0 bg-blue-500/5"></div>
                        <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-1 relative z-10">حجم الفريق</p>
                        <p class="text-base font-black text-white font-mono relative z-10"><span id="teamSize">0</span> <span class="text-[10px] text-gray-500 font-sans">عضو</span></p>
                    </div>
                    <div class="bg-[#020617] p-3 rounded-2xl border border-white/5 relative overflow-hidden">
                        <div class="absolute inset-0 bg-green-500/5"></div>
                        <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-1 relative z-10">أرباح الفريق</p>
                        <p class="text-base font-black text-green-400 font-mono relative z-10">$<span id="teamProfit">0.00</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 border-r-4 border-purple-500 rounded-[1.5rem]">
            <h3 class="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-widest flex items-center gap-2">
                <span class="text-purple-400 text-sm">🔗</span> رمز الدعوة الخاص بك
            </h3>
            
            <div class="space-y-3">
                <div class="relative">
                    <input type="text" id="inviteCode" readonly value="SYNCING..." class="w-full cyber-input p-4 rounded-xl text-xs text-cyan-400">
                </div>
                
                <button onclick="copyInviteCode()" class="w-full copy-btn rounded-xl p-3.5 flex items-center justify-center gap-3">
                    <span class="text-lg">📄</span>
                    <span class="text-[10px] font-black text-white uppercase tracking-wider">نسخ رمز الدعوة</span>
                </button>
            </div>
            <p class="text-[8px] text-gray-500 text-center mt-4 leading-relaxed">قم بمشاركة هذا الرمز مع أصدقائك أثناء التسجيل لتحصل على عمولات وإضافات لشبكتك المباشرة.</p>
        </div>

        <div class="glass-card p-5 border-t border-white/5 rounded-[2rem]">
            <div class="flex justify-between items-center mb-5 border-b border-white/5 pb-3">
                <h3 class="text-[10px] font-black text-white uppercase tracking-widest flex items-center gap-2">
                    <span>👥</span> الأعضاء المباشرين
                </h3>
                <span class="text-[8px] bg-cyan-500/10 text-cyan-400 px-2 py-1 rounded border border-cyan-500/20 font-mono" id="listCount">0 Users</span>
            </div>
            
            <div id="teamList" class="space-y-2 overflow-y-auto max-h-[250px] custom-scroll pr-1">
                <div class="text-center py-10 opacity-50 flex flex-col items-center justify-center gap-2">
                    <div class="w-5 h-5 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-[9px] font-mono text-cyan-400 uppercase">جاري مزامنة الشبكة...</span>
                </div>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 z-40 bg-[#020617]/95 backdrop-blur-xl border-t border-white/5 pb-safe shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <div class="flex justify-around items-center p-3">
            <button onclick="location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white active:scale-90 transition-all"><span class="text-lg">📈</span><span class="text-[9px] font-bold">التداول</span></button>
            <button onclick="location.href='plans.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white active:scale-90 transition-all"><span class="text-lg">💼</span><span class="text-[9px] font-bold">الباقات</span></button>
            <button class="flex flex-col items-center gap-1 text-cyan-400 relative">
                <div class="absolute -top-3 w-8 h-1 bg-cyan-400 rounded-full shadow-[0_0_10px_#22d3ee]"></div>
                <span class="text-lg drop-shadow-[0_0_8px_rgba(6,182,212,0.8)]">👥</span><span class="text-[9px] font-bold">الفريق</span>
            </button>
            <button onclick="location.href='account.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white active:scale-90 transition-all"><span class="text-lg">⚙️</span><span class="text-[9px] font-bold">حسابي</span></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="config.js"></script>
    <script>
        const userEmail = localStorage.getItem('currentUserEmail');
        let currentUserUID = "";

        function showToast(msg, type='success') {
            const container = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `px-4 py-3 rounded-xl border text-[10px] font-bold flex items-center gap-3 transform transition-all duration-300 shadow-2xl z-[9999] ${type==='success'?'bg-[#020617] border-green-500 text-green-400':'bg-[#020617] border-red-500 text-red-400'}`;
            t.innerHTML = `<span class="text-base">${type==='success'?'✅':'🛑'}</span> <span class="tracking-wide">${msg}</span>`;
            container.appendChild(t);
            requestAnimationFrame(()=>t.classList.remove('translate-y-[-20px]'));
            setTimeout(()=> { t.classList.add('translate-y-[-20px]'); setTimeout(()=>t.remove(), 300); }, 3000);
        }

        window.onload = async () => {
            if(!userEmail) return location.replace('index.html');
            await loadTeamData();
            setTimeout(() => {
                document.getElementById('ultimateLoader').style.opacity = '0';
                setTimeout(() => document.getElementById('ultimateLoader').style.display = 'none', 500);
            }, 600);
        };

        // تشفير جزء من الإيميل للخصوصية (مثال: ah***@gmail.com)
        function maskEmail(email) {
            if(!email) return "Unknown";
            const parts = email.split("@");
            if(parts.length !== 2) return email;
            const name = parts[0];
            const domain = parts[1];
            if(name.length <= 3) return name + "***@" + domain;
            return name.substring(0, 2) + "***" + name.substring(name.length - 1) + "@" + domain;
        }

        async function loadTeamData() {
            try {
                // 1. جلب بيانات المستخدم الحالي
                const { data: userData, error: userError } = await _supabase
                    .from('users')
                    .select('uid, team_profit')
                    .eq('email', userEmail)
                    .single();

                if (userError) throw userError;

                // إذا لم يكن لديه كود، نصنع له كود تلقائياً
                if (!userData.uid || userData.uid === '' || userData.uid === 'null') {
                    currentUserUID = 'SNZ-' + Math.floor(Math.random() * 90000 + 10000);
                    await _supabase.from('users').update({ uid: currentUserUID }).eq('email', userEmail);
                } else {
                    currentUserUID = userData.uid;
                }

                // تحديث الواجهة بالكود والأرباح
                document.getElementById('inviteCode').value = currentUserUID;
                document.getElementById('teamProfit').innerText = (parseFloat(userData.team_profit) || 0).toFixed(2);

                // 2. جلب أعضاء الفريق الذين استخدموا كوده (referral = currentUserUID)
                const { data: teamData, error: teamError } = await _supabase
                    .from('users')
                    .select('email, created_at, plan')
                    .eq('referral', currentUserUID)
                    .order('created_at', { ascending: false });

                if (teamError) throw teamError;

                const teamListEl = document.getElementById('teamList');
                
                if (!teamData || teamData.length === 0) {
                    document.getElementById('teamSize').innerText = "0";
                    document.getElementById('listCount').innerText = "0 Users";
                    teamListEl.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-10 opacity-40 text-center">
                            <span class="text-4xl mb-2">🌱</span>
                            <span class="text-[10px] font-bold text-gray-400">لم يقم أحد بالتسجيل برمزك حتى الآن</span>
                            <span class="text-[8px] text-gray-500 mt-1">شارك الكود للبدء في بناء فريقك</span>
                        </div>`;
                    return;
                }

                // تحديث العدادات
                document.getElementById('teamSize').innerText = teamData.length;
                document.getElementById('listCount').innerText = teamData.length + " Users";

                // رسم القائمة
                teamListEl.innerHTML = '';
                teamData.forEach(member => {
                    let date = new Date(member.created_at).toLocaleString('ar-EG', { month:'short', day:'numeric' });
                    let mPlan = member.plan ? member.plan.toUpperCase() : 'FREE';
                    let planColor = mPlan.includes('FREE') ? 'text-gray-500 border-gray-500/30' : 'text-purple-400 border-purple-500/30 bg-purple-500/10';

                    teamListEl.innerHTML += `
                        <div class="bg-[#020617] p-3 rounded-xl border border-white/5 flex justify-between items-center group hover:bg-white/5 transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-cyan-900/30 flex items-center justify-center text-sm border border-cyan-500/20">👤</div>
                                <div class="flex flex-col gap-0.5">
                                    <span class="text-[10px] text-gray-200 font-mono tracking-wider">${maskEmail(member.email)}</span>
                                    <span class="text-[8px] text-gray-500">انضم في: ${date}</span>
                                </div>
                            </div>
                            <div>
                                <span class="text-[8px] px-2 py-0.5 rounded border inline-block w-max font-bold ${planColor}">${mPlan}</span>
                            </div>
                        </div>`;
                });

            } catch (err) {
                console.error(err);
                showToast("حدث خطأ في مزامنة بيانات الفريق", "error");
            }
        }

        function copyInviteCode() {
            const codeInput = document.getElementById('inviteCode');
            if(codeInput.value === 'SYNCING...' || codeInput.value === '') return;
            
            navigator.clipboard.writeText(codeInput.value).then(() => {
                showToast("تم نسخ رمز الدعوة بنجاح!", "success");
            }).catch(() => {
                // دعم للمتصفحات القديمة
                codeInput.select();
                document.execCommand('copy');
                showToast("تم نسخ رمز الدعوة بنجاح!", "success");
            });
        }
    </script>
</body>
</html>
